<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Booking — Campus Resource Booking</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <nav class="navbar">
    <a href="dashboard.html" class="navbar-brand">
      <span class="brand-dot"></span>
      MMU Resource Booking
    </a>
    <ul class="navbar-nav">
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="resources.html">Resources</a></li>
      <li><a href="booking.html" class="active">New Booking</a></li>
      <li><a href="my-bookings.html">My Bookings</a></li>
    </ul>
    <div class="navbar-user">
      <div class="avatar"></div>
      <span class="nav-username"></span>
      <button class="btn-logout">Sign Out</button>
    </div>
  </nav>

  <div class="page-wrapper">

    <div class="page-header">
      <h1>New Booking</h1>
      <p>Fill in the details below to reserve a campus resource.</p>
    </div>

    <div style="display:grid;grid-template-columns:1fr 340px;gap:24px;align-items:start;">

      <!-- BOOKING FORM -->
      <div class="card">
        <form id="booking-form" novalidate>

          <div class="form-group">
            <label for="resource-select">Select Resource <span style="color:var(--mmu-red)">*</span></label>
            <select id="resource-select" required>
              <option value="">— Choose a resource —</option>
            </select>
          </div>

          <div class="form-group">
            <label for="purpose">Purpose / Description <span style="color:var(--mmu-red)">*</span></label>
            <textarea id="purpose" placeholder="e.g. CCS6344 Lab Assignment, Guest Lecture, Presentation Practice…" required></textarea>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="start-time">Start Date & Time <span style="color:var(--mmu-red)">*</span></label>
              <input type="datetime-local" id="start-time" required />
            </div>
            <div class="form-group">
              <label for="end-time">End Date & Time <span style="color:var(--mmu-red)">*</span></label>
              <input type="datetime-local" id="end-time" required />
            </div>
          </div>

          <div class="form-group">
            <label for="attendees">Expected Attendees</label>
            <input type="number" id="attendees" placeholder="e.g. 25" min="1" />
            <div class="form-hint" id="capacity-hint"></div>
          </div>

          <div id="form-error" class="alert" style="display:none;background:#fee2e2;color:#991b1b;border:1px solid #fca5a5;padding:12px 16px;border-radius:8px;font-size:.88rem;margin-bottom:16px;"></div>

          <div style="display:flex;gap:12px;">
            <button type="submit" class="btn btn-primary">📅 Confirm Booking</button>
            <a href="resources.html" class="btn btn-outline">Cancel</a>
          </div>

        </form>
      </div>

      <!-- BOOKING SUMMARY SIDEBAR -->
      <div>
        <div class="card" style="margin-bottom:18px;">
          <div class="section-title" style="margin-bottom:14px;">Booking Summary</div>
          <div class="booking-summary" style="margin-bottom:0;">
            <div class="summary-item">
              <span class="s-label">Resource</span>
              <span class="s-val" id="sum-resource">—</span>
            </div>
            <div class="summary-item">
              <span class="s-label">Category</span>
              <span class="s-val" id="sum-category">—</span>
            </div>
            <div class="summary-item">
              <span class="s-label">Capacity</span>
              <span class="s-val" id="sum-capacity">—</span>
            </div>
            <div class="summary-item">
              <span class="s-label">Start</span>
              <span class="s-val" id="sum-start">—</span>
            </div>
            <div class="summary-item">
              <span class="s-label">End</span>
              <span class="s-val" id="sum-end">—</span>
            </div>
            <div class="summary-item">
              <span class="s-label">Duration</span>
              <span class="s-val" id="sum-duration">—</span>
            </div>
            <div class="summary-item">
              <span class="s-label">Booked By</span>
              <span class="s-val" id="sum-user">—</span>
            </div>
          </div>
        </div>

      </div>

    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script>
    (async () => {
      const user = Session.require();
      if (!user) return;
      initNavbar(user);
      document.getElementById('sum-user').textContent = user.fullName;

      const resources = await API.get('/resources');
      setResourceCache(resources);

      const sel = document.getElementById('resource-select');
      resources.filter(r => r.status === 'Active').forEach(r => {
        const opt = document.createElement('option');
        opt.value = r.id;
        opt.textContent = `${r.icon} ${r.name} (${r.category})`;
        sel.appendChild(opt);
      });

      const params = new URLSearchParams(window.location.search);
      if (params.get('resource')) { sel.value = params.get('resource'); updateResourceSummary(); }

      const now = new Date();
      now.setMinutes(0, 0, 0);
      now.setHours(now.getHours() + 1);
      const end = new Date(now); end.setHours(end.getHours() + 2);
      const toLocal = d => d.toISOString().slice(0, 16);
      document.getElementById('start-time').value = toLocal(now);
      document.getElementById('end-time').value   = toLocal(end);
      updateTimeSummary();

      function updateResourceSummary() {
        const res = resourceById(sel.value);
        document.getElementById('sum-resource').textContent  = res.name     || '—';
        document.getElementById('sum-category').textContent  = res.category || '—';
        document.getElementById('sum-capacity').textContent  = res.capacity ? `${res.capacity} pax` : '—';
        document.getElementById('capacity-hint').textContent = res.capacity ? `Max capacity: ${res.capacity} people` : '';
      }

      function updateTimeSummary() {
        const s = document.getElementById('start-time').value;
        const e = document.getElementById('end-time').value;
        document.getElementById('sum-start').textContent = s ? fmt(s) : '—';
        document.getElementById('sum-end').textContent   = e ? fmt(e) : '—';
        if (s && e) {
          const mins = (new Date(e) - new Date(s)) / 60000;
          if (mins > 0) {
            const h = Math.floor(mins / 60), m = mins % 60;
            document.getElementById('sum-duration').textContent =
              h ? `${h}h ${m ? m + 'm' : ''}`.trim() : `${m}m`;
          } else {
            document.getElementById('sum-duration').textContent = '—';
          }
        }
      }

      sel.addEventListener('change', updateResourceSummary);
      document.getElementById('start-time').addEventListener('change', updateTimeSummary);
      document.getElementById('end-time').addEventListener('change', updateTimeSummary);

      document.getElementById('booking-form').addEventListener('submit', async function (e) {
        e.preventDefault();
        const errEl     = document.getElementById('form-error');
        errEl.style.display = 'none';

        const resourceId = parseInt(sel.value);
        const purpose    = document.getElementById('purpose').value.trim();
        const startTime  = document.getElementById('start-time').value;
        const endTime    = document.getElementById('end-time').value;

        if (!resourceId) { errEl.textContent = 'Please select a resource.';          errEl.style.display = 'block'; return; }
        if (!purpose)    { errEl.textContent = 'Please enter a purpose.';             errEl.style.display = 'block'; return; }
        if (!startTime || !endTime) { errEl.textContent = 'Please set start and end times.'; errEl.style.display = 'block'; return; }
        if (new Date(endTime) <= new Date(startTime)) { errEl.textContent = 'End time must be after start time.'; errEl.style.display = 'block'; return; }

        try {
          await API.post('/bookings', { resourceId, purpose, startTime, endTime });
          showToast('Booking confirmed successfully!', 'success');
          setTimeout(() => window.location.href = 'my-bookings.html', 1000);
        } catch (err) {
          errEl.textContent = err.error || 'Failed to create booking.';
          errEl.style.display = 'block';
        }
      });
    })();
  </script>
</body>
</html>
