AWSTemplateFormatVersion: '2010-09-09'
Description: >
  IAM instance profile for EC2 — least-privilege access to
  Secrets Manager and CloudWatch Logs.

Parameters:
  EnvironmentName:
    Type: String
    Default: campus-booking

Resources:

  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${EnvironmentName}-ec2-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Policies:
        - PolicyName: S3BackupWrite
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                Resource: !Sub 'arn:aws:s3:::${EnvironmentName}-backups-${AWS::AccountId}/*'
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub '${EnvironmentName}-ec2-profile'
      Roles:
        - !Ref EC2InstanceRole

Outputs:
  EC2InstanceProfileArn:
    Value: !GetAtt EC2InstanceProfile.Arn
    Export:
      Name: !Sub '${EnvironmentName}-EC2InstanceProfileArn'
  EC2RoleArn:
    Value: !GetAtt EC2InstanceRole.Arn
    Export:
      Name: !Sub '${EnvironmentName}-EC2RoleArn'
