AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Application Load Balancer (HTTP) + EC2 Auto Scaling Group in private app subnets.
  ALB listens on port 80 (HTTP). For production add an ACM cert and switch to HTTPS.

Parameters:
  EnvironmentName:
    Type: String
    Default: campus-booking
  AmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    Description: Latest Amazon Linux 2023 AMI
  InstanceType:
    Type: String
    Default: t3.micro
  DBMasterUsername:
    Type: String
    Default: admin
  DBMasterPassword:
    Type: String
    NoEcho: true
    Default: CampusBooking2025!
  DbEndpoint:
    Type: String
    Description: RDS endpoint (from stack 04)

Resources:

  # ── ALB ──────────────────────────────────────────────────────────────────
  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub '${EnvironmentName}-alb'
      Scheme: internet-facing
      Type: application
      Subnets:
        - !ImportValue
          Fn::Sub: '${EnvironmentName}-PublicSubnet1'
        - !ImportValue
          Fn::Sub: '${EnvironmentName}-PublicSubnet2'
      SecurityGroups:
        - !ImportValue
          Fn::Sub: '${EnvironmentName}-AlbSgId'
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-alb'

  HttpListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref AppTargetGroup

  AppTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub '${EnvironmentName}-tg'
      VpcId: !ImportValue
        Fn::Sub: '${EnvironmentName}-VpcId'
      Protocol: HTTP
      Port: 3000
      TargetType: instance
      HealthCheckPath: /health
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3

  # ── Launch Template ────────────────────────────────────────────────────────
  AppLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub '${EnvironmentName}-lt'
      LaunchTemplateData:
        ImageId: !Ref AmiId
        InstanceType: !Ref InstanceType
        IamInstanceProfile:
          Name: LabInstanceProfile
        SecurityGroupIds:
          - !ImportValue
            Fn::Sub: '${EnvironmentName}-AppSgId'
        MetadataOptions:
          HttpTokens: required
          HttpPutResponseHopLimit: 1
        BlockDeviceMappings:
          - DeviceName: /dev/xvda
            Ebs:
              VolumeSize: 20
              VolumeType: gp3
              Encrypted: true
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            set -euxo pipefail

            # Install Node.js 20
            curl -fsSL https://rpm.nodesource.com/setup_20.x | bash -
            yum install -y nodejs git

            # Clone application
            git clone https://github.com/sleepy-nii/campus-booking-aws.git /opt/campus-booking
            cd /opt/campus-booking/app/backend
            npm install --production

            # Write environment config
            SESSION_SECRET=$(openssl rand -hex 32)
            cat > /opt/campus-booking/.env << 'ENVEOF'
            NODE_ENV=development
            PORT=3000
            DB_HOST=${DbEndpoint}
            DB_NAME=CampusBookingDB
            DB_USER=${DBMasterUsername}
            DB_PASSWORD=${DBMasterPassword}
            DB_SSL=false
            AWS_REGION=${AWS::Region}
            ENVEOF
            echo "SESSION_SECRET=$SESSION_SECRET" >> /opt/campus-booking/.env

            # Start app
            nohup node /opt/campus-booking/app/backend/app.js >> /tmp/app.log 2>&1 &

  # ── Auto Scaling Group ────────────────────────────────────────────────────
  AppASG:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      AutoScalingGroupName: !Sub '${EnvironmentName}-asg'
      LaunchTemplate:
        LaunchTemplateId: !Ref AppLaunchTemplate
        Version: !GetAtt AppLaunchTemplate.LatestVersionNumber
      VPCZoneIdentifier:
        - !ImportValue
          Fn::Sub: '${EnvironmentName}-PrivateAppSubnet1'
        - !ImportValue
          Fn::Sub: '${EnvironmentName}-PrivateAppSubnet2'
      TargetGroupARNs:
        - !Ref AppTargetGroup
      MinSize: '1'
      MaxSize: '2'
      DesiredCapacity: '1'
      HealthCheckType: ELB
      HealthCheckGracePeriod: 120
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-app'
          PropagateAtLaunch: true

Outputs:
  AlbDnsName:
    Value: !GetAtt ALB.DNSName
    Export:
      Name: !Sub '${EnvironmentName}-AlbDns'
  AlbArn:
    Value: !Ref ALB
    Export:
      Name: !Sub '${EnvironmentName}-AlbArn'
